<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Sürprizim Var... 🥺</title>
    <style>
        :root {
            --ana-pembe: #ff4d6d;
            --orta-pembe: #ff8fa3;
            --acik-pembe: #fff0f3;
            --cerceve-rengi: #ffccd5;
            --balon-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--acik-pembe);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #heartBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.4);
            font-size: 24px;
            animation: ucma 5s linear forwards;
        }

        @keyframes ucma {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .main-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* Karakter Bölümü */
        .character-box {
            position: relative;
            z-index: 5;
            margin-bottom: -15px; /* Diyalogla birleşmesi için */
            animation: havadaDurma 3s ease-in-out infinite;
        }

        @keyframes havadaDurma {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .character-box img:first-child {
            width: 190px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(255, 77, 109, 0.3));
        }

        /* Radyo Tasarımı ve Yerleşimi */
        #radioImg {
            width: 95px;
            display: none;
            position: absolute;
            bottom: -35px; /* Karakterin önüne düşmesi için */
            right: 0px;
            z-index: 20; /* Her şeyin en üstünde */
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
        }

        .radio-fall {
            display: block !important;
            animation: fall 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-600px) rotate(-90deg); opacity: 0; }
            100% { transform: translateY(0) rotate(0deg); opacity: 1; }
        }

        /* Konuşma Balonu */
        .speech-bubble {
            position: relative;
            background: var(--balon-bg);
            border: 4px solid var(--cerceve-rengi);
            border-radius: 30px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.15);
            width: 85%;
            z-index: 2; /* Radyonun altında, kalplerin üstünde */
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #messageText {
            color: #d63384;
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.5;
        }

        /* Butonlar */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            min-height: 100px;
            width: 100%;
            z-index: 10;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.2);
        }

        #allowBtn { 
            background: linear-gradient(45deg, var(--ana-pembe), var(--orta-pembe)); 
            color: white; 
        }

        #allowBtn:hover { transform: scale(1.05); }

        .vibrate {
            animation: vibrate 0.4s linear infinite;
        }

        @keyframes vibrate {
            0% { transform: rotate(0); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
            100% { transform: rotate(0); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3"></audio>
    <div id="heartBg"></div>

    <div class="main-stage">
        <div class="character-box">
            <img src="karakter.png" alt="Karakter">
            <img src="radyo.png" id="radioImg" alt="Radyo">
        </div>

        <div class="speech-bubble">
            <p id="messageText">Sana bir şarkı açabilir miyim aşkım? 🥺</p>
        </div>

        <div class="btn-group" id="btnGroup">
            <button class="btn" id="allowBtn" onclick="startMusic()">Tabii ki! ❤️</button>
        </div>
    </div>

    <script>
        const isim = "Esra"; // Burayı istersen değiştirebilirsin
        const messageText = document.getElementById('messageText');
        const radioImg = document.getElementById('radioImg');
        const bgMusic = document.getElementById('bgMusic');
        const btnGroup = document.getElementById('btnGroup');

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = ['❤️','💖','💗','🌸'][Math.floor(Math.random()*4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.getElementById('heartBg').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        function startMusic() {
            btnGroup.style.opacity = '0';
            setTimeout(() => { btnGroup.style.display = 'none'; }, 300);
            
            messageText.innerText = "Umarım bu şarkıyı seversin... Seni çok seviyorum! 🥰";
            radioImg.classList.add('radio-fall');

            bgMusic.play().catch(e => console.log("Müzik için etkileşim gerekiyor."));

            setTimeout(() => {
                radioImg.classList.add('vibrate');
            }, 1000);
            
            // 6 saniye sonra affetme butonlarını getir
            setTimeout(() => {
                messageText.innerText = "Beni affettin mi? 🥺";
                btnGroup.innerHTML = `
                    <button class="btn" style="background: #ff4d6d; color: white;" onclick="celebrate()">Evet ❤️</button>
                    <button class="btn" style="background: white; color: #777; border: 2px solid #eee;" id="declineBtn" onclick="handleDecline()">Hayır</button>
                `;
                btnGroup.style.display = 'flex';
                btnGroup.style.opacity = '1';
            }, 6000);
        }

        let redSayaci = 0;
        function handleDecline() {
            redSayaci++;
            const declineBtn = document.getElementById('declineBtn');
            const acceptBtn = btnGroup.querySelector('button');
            
            if (redSayaci >= 3) {
                declineBtn.style.position = 'fixed';
                declineBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
                declineBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
            acceptBtn.style.transform = `scale(${1 + redSayaci * 0.25})`;
            messageText.innerText = "Hadi ama lütfen, bak radyo bile çalıyor... 💔";
        }

        function celebrate() {
            messageText.innerText = "OLEY! 🎉 Dünyanın en mutlu insanıyım! Seni çok seviyorum! ❤️";
            btnGroup.style.display = 'none';
            // Arka plandaki kalpleri hızlandır
            setInterval(createHeart, 100);
        }
    </script>
</body>
</html>
