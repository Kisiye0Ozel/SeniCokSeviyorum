<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Sürprizim Var... 🥺</title>
    <style>
        :root {
            --ana-pembe: #ff4d6d;
            --acik-pembe: #fff0f3;
            --cerceve-rengi: #ffccd5;
            --balon-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--acik-pembe);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #heartBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.3);
            font-size: 24px;
            animation: ucma 5s linear forwards;
        }

        @keyframes ucma {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .main-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            z-index: 100;
        }

        .character-box {
            position: relative;
            margin-bottom: 10px;
            animation: havadaDurma 3s ease-in-out infinite;
        }

        @keyframes havadaDurma {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .character-box img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(255, 77, 109, 0.3));
        }

        /* Radyo Düşme Animasyonu */
        #radioImg {
            width: 80px;
            display: none;
            position: absolute;
            bottom: -60px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .radio-fall {
            display: block !important;
            animation: fall 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-500px) rotate(-45deg); opacity: 0; }
            100% { transform: translateY(0) rotate(0deg); opacity: 1; }
        }

        .speech-bubble {
            position: relative;
            background: var(--balon-bg);
            border: 4px solid var(--cerceve-rengi);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.1);
            width: 85%;
            margin-bottom: 25px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -18px; left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px;
            border-style: solid;
            border-color: var(--cerceve-rengi) transparent;
        }

        #messageText {
            color: #d63384;
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        #allowBtn { background: var(--ana-pembe); color: white; }

        /* Müzik çalarken radyonun sallanması */
        .vibrate {
            animation: vibrate 0.3s linear infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3"></audio>
    <div id="heartBg"></div>

    <div class="main-stage">
        <div class="character-box">
            <img src="karakter.png" alt="Karakter">
            <img src="radyo.png" id="radioImg" alt="Radyo">
        </div>

        <div class="speech-bubble">
            <p id="messageText">Sana bir şarkı açabilir miyim aşkım? 🥺</p>
        </div>

        <div class="btn-group" id="btnGroup">
            <button class="btn" id="allowBtn" onclick="startMusic()">Tabii ki! ❤️</button>
        </div>
    </div>

    <script>
        const isim = "Esra";
        const messageText = document.getElementById('messageText');
        const radioImg = document.getElementById('radioImg');
        const bgMusic = document.getElementById('bgMusic');
        const btnGroup = document.getElementById('btnGroup');

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.getElementById('heartBg').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 500);

        function startMusic() {
            // Butonu gizle
            btnGroup.style.display = 'none';
            
            // Mesajı güncelle
            messageText.innerText = "Umarım bu şarkıyı seversin... Seni çok seviyorum! 🥰";

            // Radyoyu düşür
            radioImg.classList.add('radio-fall');

            // Müziği başlat
            bgMusic.play().catch(e => console.log("Müzik başlatılamadı, etkileşim gerekiyor."));

            // Müzik çalmaya başlayınca radyoyu salla
            setTimeout(() => {
                radioImg.classList.add('vibrate');
            }, 800);
            
            // İstersen 5 saniye sonra asıl affetme ekranına geçebiliriz
            setTimeout(() => {
                messageText.innerText = "Beni affettin mi? 🥺";
                btnGroup.innerHTML = `
                    <button class="btn" style="background: #ff4d6d; color: white;" onclick="celebrate()">Evet ❤️</button>
                    <button class="btn" style="background: white; color: #777; border: 2px solid #eee;" id="declineBtn" onclick="handleDecline()">Hayır</button>
                `;
                btnGroup.style.display = 'flex';
            }, 6000);
        }

        // --- Diğer Fonksiyonlar (Önceki kodundan gelenler) ---
        let redSayaci = 0;
        function handleDecline() {
            redSayaci++;
            const declineBtn = document.getElementById('declineBtn');
            const acceptBtn = btnGroup.querySelector('button');
            
            if (redSayaci >= 3) {
                declineBtn.style.position = 'fixed';
                declineBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
                declineBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
            acceptBtn.style.transform = `scale(${1 + redSayaci * 0.2})`;
            messageText.innerText = "Hadi ama " + isim + ", lütfen... 💔";
        }

        function celebrate() {
            messageText.innerText = "OLEY! 🎉 Seni çok seviyorum " + isim + "! ❤️";
            btnGroup.style.display = 'none';
            // Daha önce yaptığın başarı ekranını buraya da ekleyebilirsin.
        }
    </script>
</body>
</html>inde
